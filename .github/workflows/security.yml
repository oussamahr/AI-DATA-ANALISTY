name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety
      - name: Scan dependencies with Safety
        run: safety check -r backend/requirements.txt --full-report
      - name: Scan with pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
      - name: Run Bandit
        run: bandit -c pyproject.toml -r backend/ -f sarif -o bandit-results.sarif
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/django

  django-security:
    name: Django Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        env:
          SECRET_KEY: dummy-key-for-ci
      - name: Run schema validation
        run: |
          cd backend
          python -c "from app.core.config import settings; print(f'Config OK: {settings.ENVIRONMENT}')"
        env:
          SECRET_KEY: ci-secret-key
          DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@localhost:5432/ci_db

  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t app:latest -f docker/Dockerfile .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:latest
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
