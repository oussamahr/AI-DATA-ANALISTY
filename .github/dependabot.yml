version: 2
updates:
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    allow:
      - dependency-type: direct
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    labels:
      - ci
      - security
